<!DOCTYPE html>
<html lang="sr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI-IQ Super Platforma</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #0a0a1a;
      color: #e0e0e0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    .container { max-width: 960px; margin: 0 auto; padding: 0 1.5rem; }
    header {
      background: #111128;
      border-bottom: 1px solid #2a2a4a;
      padding: 1rem 0;
    }
    .header-inner { display: flex; align-items: center; gap: 0.75rem; }
    .logo-icon { font-size: 1.75rem; }
    .logo-text { font-size: 1.25rem; font-weight: 700; color: #a78bfa; }
    .hero {
      text-align: center;
      padding: 3rem 0 2rem;
    }
    .hero h1 { font-size: 2rem; margin-bottom: 0.75rem; }
    .hero .highlight { color: #a78bfa; }
    .hero p { color: #9ca3af; max-width: 600px; margin: 0 auto; }
    .platforms { padding: 2rem 0 3rem; }
    .platforms h2 { text-align: center; margin-bottom: 1.5rem; font-size: 1.5rem; }
    .platform-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 1.5rem;
    }
    .platform-card {
      background: #161630;
      border: 1px solid #2a2a4a;
      border-radius: 12px;
      padding: 2rem 1.5rem;
      text-align: center;
      transition: transform 0.2s, border-color 0.2s;
    }
    .platform-card:hover {
      transform: translateY(-4px);
      border-color: #a78bfa;
    }
    .platform-icon { font-size: 2.5rem; margin-bottom: 0.75rem; }
    .platform-card h3 { margin-bottom: 0.5rem; color: #fff; }
    .platform-card p { color: #9ca3af; font-size: 0.95rem; margin-bottom: 1.25rem; }
    .btn {
      display: inline-block;
      padding: 0.6rem 1.5rem;
      border-radius: 8px;
      text-decoration: none;
      font-weight: 600;
      font-size: 0.95rem;
      transition: background 0.2s;
    }
    .btn-primary { background: #7c3aed; color: #fff; }
    .btn-primary:hover { background: #6d28d9; }
    footer {
      margin-top: auto;
      text-align: center;
      padding: 1.5rem 0;
      border-top: 1px solid #2a2a4a;
      color: #6b7280;
      font-size: 0.875rem;
    }
    footer a { color: #a78bfa; text-decoration: none; }
    footer a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <header>
    <div class="container header-inner">
      <span class="logo-icon">🧠</span>
      <span class="logo-text">AI-IQ Super Platforma</span>
    </div>
  </header>

  <main>
    <section class="hero">
      <div class="container">
        <h1>Dobrodošli na <span class="highlight">AI-IQ Super Platformu</span></h1>
        <p>Centralni portal koji objedinjuje sve AI-IQ platforme na jednom mestu.</p>
      </div>
    </section>

    <section class="platforms">
      <div class="container">
        <h2>Naše Platforme</h2>
        <div class="platform-grid">
          <div class="platform-card">
            <div class="platform-icon">🤖</div>
            <h3>Omega AI</h3>
            <p>Napredna AI platforma za inteligentne razgovore i rešavanje problema.</p>
            <a href="https://chatgpt.com/c/686787a3-1168-8006-8d37-418e3e220e69" class="btn btn-primary" target="_blank" rel="noopener noreferrer">Otvori Omega AI</a>
          </div>
        </div>
      </div>
    </section>
  </main>

  <footer>
    <div class="container">
      <p>&copy; 2025 AI-IQ Super Platforma &mdash; <a href="https://github.com/spaja86/AI-IQ-SUPER-PLATFORMA">GitHub</a></p>
    </div>
  </footer>
</body>
</html>
