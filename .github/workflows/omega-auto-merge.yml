# ═══════════════════════════════════════════════════════════
# 🔄 OMEGA Auto Merge — Automatski merge PR-ova
# ═══════════════════════════════════════════════════════════
#
# Automatski merge-uje PR-ove koji:
# 1. Imaju label 'omega-evolucija' ili su od Copilot agenta
# 2. Prošli su sve CI checks (build, lint, typecheck)
#

name: 🔄 Omega Auto Merge

on:
  check_suite:
    types: [completed]
  pull_request_review:
    types: [submitted]
  workflow_run:
    workflows: ['🏗️ Omega Build']
    types: [completed]

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    name: 🔄 Auto Merge
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success' || github.event_name == 'check_suite'
    steps:
      - name: 🔍 Pronađi PR-ove za merge
        uses: actions/github-script@v9
        with:
          script: |
            // Pronađi otvorene PR-ove sa omega-evolucija labelom
            const pulls = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              per_page: 10,
            });
            
            for (const pr of pulls.data) {
              const hasOmegaLabel = pr.labels.some(l => l.name === 'omega-evolucija');
              const isCopilot = pr.user?.login?.includes('copilot') || pr.user?.login?.includes('bot');
              
              if (!hasOmegaLabel && !isCopilot) continue;
              
              // Proveri status checks
              const checks = await github.rest.checks.listForRef({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: pr.head.sha,
              });
              
              const allPassed = checks.data.check_runs.every(
                c => c.conclusion === 'success' || c.conclusion === 'skipped'
              );
              
              if (!allPassed || checks.data.total_count === 0) {
                console.log(`PR #${pr.number}: Checks nisu prošli. Preskačem.`);
                continue;
              }
              
              // Merge PR
              try {
                await github.rest.pulls.merge({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  pull_number: pr.number,
                  merge_method: 'squash',
                  commit_title: `🧬 Omega Evolucija: ${pr.title}`,
                });
                
                console.log(`✅ PR #${pr.number} uspešno merge-ovan!`);
                
                // Obriši source branch nakon merge-a
                try {
                  await github.rest.git.deleteRef({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    ref: `heads/${pr.head.ref}`,
                  });
                  console.log(`🗑️ Obrisana grana: ${pr.head.ref}`);
                } catch (delErr) {
                  console.log(`⚠️ Nije moguće obrisati granu ${pr.head.ref}: ${delErr.message}`);
                }
              } catch (e) {
                console.log(`❌ PR #${pr.number}: Greška pri merge-u: ${e.message}`);
              }
            }
