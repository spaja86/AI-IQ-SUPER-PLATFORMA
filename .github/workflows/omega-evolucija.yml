# ═══════════════════════════════════════════════════════════
# 🧬 OMEGA Evolucioni Ciklus
# ═══════════════════════════════════════════════════════════
#
# Automatski pokreće evolucioni ciklus svakih 6 sati.
# Dijagnostikuje sistem, generiše preporuke, i kreira Issues
# koje Copilot agent zatim automatski rešava.
#
# Ciklus: Dijagnostika → Issue → Copilot Agent → PR → Auto-merge → Deploy
#

name: 🧬 Omega Evolucija

on:
  schedule:
    # Svakih 6 sati: 00:00, 06:00, 12:00, 18:00 UTC
    - cron: '0 */6 * * *'
  workflow_dispatch:
    inputs:
      razlog:
        description: 'Razlog za ručno pokretanje evolucije'
        required: false
        default: 'Ručno pokretanje evolucijskog ciklusa'

permissions:
  contents: read
  issues: write

jobs:
  dijagnostika:
    name: 🩺 Dijagnostika sistema
    runs-on: ubuntu-latest
    outputs:
      zdravlje: ${{ steps.dijag.outputs.zdravlje }}
    steps:
      - name: ⬇️ Checkout koda
        uses: actions/checkout@v6

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: 📥 Instalacija zavisnosti
        run: npm ci

      - name: 🔍 TypeScript provera tipova
        id: typecheck
        run: npx tsc --noEmit 2>&1 | tee /tmp/typecheck.txt || true

      - name: 🔍 ESLint provera
        id: eslint
        run: npx eslint src/ 2>&1 | tee /tmp/eslint.txt || true

      - name: 🏗️ Build provera
        id: build
        run: npx next build 2>&1 | tee /tmp/build.txt || true

      - name: 📊 Generisanje dijagnostičkog izveštaja
        id: dijag
        run: |
          TYPECHECK_ERRORS=$(grep -c "error TS" /tmp/typecheck.txt 2>/dev/null || echo "0")
          ESLINT_ERRORS=$(grep -c " error " /tmp/eslint.txt 2>/dev/null || echo "0")
          BUILD_ERRORS=$(grep -c "Build error\|Failed to compile" /tmp/build.txt 2>/dev/null || echo "0")
          
          ERRORS=$((TYPECHECK_ERRORS + ESLINT_ERRORS + BUILD_ERRORS))
          if [ "$ERRORS" -eq 0 ]; then
            ZDRAVLJE=100
          elif [ "$ERRORS" -le 3 ]; then
            ZDRAVLJE=75
          elif [ "$ERRORS" -le 10 ]; then
            ZDRAVLJE=50
          else
            ZDRAVLJE=25
          fi
          
          echo "zdravlje=$ZDRAVLJE" >> "$GITHUB_OUTPUT"
          echo "## 🩺 Dijagnostički Izveštaj" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Zdravlje:** $ZDRAVLJE%" >> "$GITHUB_STEP_SUMMARY"
          echo "- **TypeScript greške:** $TYPECHECK_ERRORS" >> "$GITHUB_STEP_SUMMARY"
          echo "- **ESLint greške:** $ESLINT_ERRORS" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Build greške:** $BUILD_ERRORS" >> "$GITHUB_STEP_SUMMARY"

  evolucija:
    name: 🧬 Evolucioni ciklus
    needs: dijagnostika
    runs-on: ubuntu-latest
    steps:
      - name: ⬇️ Checkout koda
        uses: actions/checkout@v6

      - name: 📊 Kreiranje evolucijskog Issue-a
        if: needs.dijagnostika.outputs.zdravlje != '100'
        uses: actions/github-script@v8
        with:
          script: |
            const zdravlje = '${{ needs.dijagnostika.outputs.zdravlje }}';
            const datum = new Date().toISOString().split('T')[0];
            
            // Proveri da li već postoji issue za danas
            const existingIssues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'omega-evolucija',
              state: 'open',
              per_page: 10,
            });
            
            const danasnji = existingIssues.data.filter(i => 
              i.created_at.startsWith(datum)
            );
            
            if (danasnji.length >= 5) {
              console.log('Dostignut dnevni limit od 5 issue-a. Preskačem.');
              return;
            }
            
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🧬 [Omega Evolucija] Automatsko poboljšanje — ${datum}`,
              body: [
                '## 🧬 Omega Evolucioni Ciklus',
                '',
                `**Datum:** ${datum}`,
                `**Zdravlje sistema:** ${zdravlje}%`,
                `**Pokrenuo:** Omega Evolucioni Motor (automatski)`,
                '',
                '### 📋 Preporuke za poboljšanje',
                '',
                '- [ ] Proveriti i popraviti TypeScript greške',
                '- [ ] Proveriti i popraviti ESLint upozorenja',
                '- [ ] Optimizovati build performanse',
                '- [ ] Ažurirati zavisnosti (`npm audit fix`)',
                '- [ ] Proveriti bezbednosne zaglavlja',
                '- [ ] Unaprediti test pokrivenost',
                '',
                '### 🤖 Instrukcije za Copilot agenta',
                '',
                'Automatski analiziraj i popravi probleme u kodu.',
                'Fokusiraj se na TypeScript greške, lint probleme, i bezbednost.',
                'Napravi minimalne, precizne promene.',
                '',
                '---',
                '*Generisano automatski od Omega Evolucionog Motora v1.0.0*',
              ].join('\n'),
              labels: ['omega-evolucija', 'copilot'],
            });

      - name: ✅ Evolucija kompletna
        run: |
          echo "## 🧬 Evolucioni ciklus završen" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Zdravlje:** ${{ needs.dijagnostika.outputs.zdravlje }}%" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Vreme:** $(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_STEP_SUMMARY"
